<!-- FILENAME: index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gavin Guinn's small corner of the web.">
    <title>guinn8.ca</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            display: grid;
            min-height: 100vh;
            margin: 0;
            place-items: center;
            background: #f6f4ed;
            color: #17231d;
        }

        main {
            width: min(34rem, calc(100% - 3rem));
        }

        h1 {
            margin: 0 0 1rem;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 500;
            letter-spacing: -0.06em;
            line-height: 0.9;
        }

        p {
            max-width: 30rem;
            margin: 0;
            color: #536159;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem 1.25rem;
            margin-top: 2rem;
        }

        a {
            color: #287356;
            text-underline-offset: 0.25em;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #151a17;
                color: #eef4ef;
            }

            p {
                color: #adbab1;
            }

            a {
                color: #8fd4b5;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Gavin Guinn</h1>
        <p>I make software, small tools, and the occasional presentation in Calgary.</p>
        <nav aria-label="Primary navigation">
            <a href="./projects/index.html">Projects</a>
            <a href="./projects/portfolio/index.html">Portfolio</a>
            <a href="https://github.com/guinn8/">GitHub</a>
            <a id="email-link" href="#">Email</a>
        </nav>
    </main>
    <script>
        const email = ["gavinguinn1", "gmail", "com"].join(".").replace(".", "@");
        document.querySelector("#email-link").href = `mailto:${email}`;
    </script>
</body>
</html>
